name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dev dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun test

  smoke-e2e:
    name: Smoke E2E (skip-graceful without Langfuse secrets)
    runs-on: ubuntu-latest
    needs: test
    env:
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'http://localhost:3000' }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dev dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke E2E (skip-graceful if no creds)
        run: bun run scripts/smoke-mcp-e2e.ts

  smoke-litellm:
    name: Smoke LiteLLM (skip gracefully without gateway creds)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || 'http://localhost:3000' }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LITELLM_HOST: ${{ secrets.LITELLM_HOST || 'http://localhost:4001' }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dev dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke LiteLLM (skip-graceful if no creds or gateway unreachable)
        run: bun run scripts/smoke-litellm-langfuse.ts
