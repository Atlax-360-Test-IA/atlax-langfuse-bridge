# cloud-run.yaml — Langfuse v3 manifest para Cloud Run (europe-west1).
#
# === STATUS: REFERENCE — render with envsubst before `gcloud run services replace` =====
#
# Manifest target para PRO migration. Decisiones formales:
#   - I-13 (ADR-002): hook/reconciler/discovery NUNCA migran a Cloud Run
#   - ADR-012: ClickHouse self-hosted en GCE VM (europe-west1, IP privada 10.20.10.20)
#   - Plan formal: docs/operations/cloud-run-deployment-plan.md
#
# Variables que envsubst reemplaza al render (ver provision-pro.sh):
#   $GCP_PROJECT_ID         — id del proyecto GCP (ej. atlax360-ai-langfuse-pro)
#   $LANGFUSE_VERSION       — versión de la imagen langfuse (ej. 3.172.1)
#
# To deploy:
#   envsubst < infra/cloud-run.yaml > /tmp/cloud-run.rendered.yaml
#   gcloud run services replace /tmp/cloud-run.rendered.yaml --region=europe-west1
#   # Promote (después de validar):
#   gcloud run services update-traffic langfuse-web   --to-revisions=LATEST=100 --region=europe-west1
#   gcloud run services update-traffic langfuse-worker --to-revisions=LATEST=100 --region=europe-west1
#
# What CANNOT migrate to Cloud Run (per invariant I-13):
#   - hooks/langfuse-sync.ts        — needs filesystem access to JSONLs
#   - scripts/reconcile-traces.ts   — needs ~/.claude/projects scan
#   - scripts/detect-tier.ts        — needs ~/.claude/.credentials.json check
#   - scripts/backup-langfuse.sh    — uses docker exec (and refuses to run via K_SERVICE guard)
#   - browser-extension/            — runs in dev's Chrome
#
# Cambios respecto al manifest pre-2026-05-08 (auditoría 360º):
#   1. vpc-access-connector → network-interfaces (Direct VPC egress, GA)
#   2. Eliminado cloudsql-instances (Postgres via Private IP en mismo VPC)
#   3. livenessProbe.periodSeconds 30→60, failureThreshold 3 (UI hace SSE largos)
#   4. timeoutSeconds web 60→300 (export/eval pueden tardar)
#   5. Añadidos LANGFUSE_S3_MEDIA_UPLOAD_* (faltaban respecto a docker-compose)
#   6. OTEL_SDK_DISABLED=true hasta decidir Cloud Trace
#   7. SAs verificadas sin roles/owner heredado
#   8. execution-environment: gen2 explícito
#   9. --no-traffic en deploy (tráfico se promueve por separado)
#  10. web minScale=0 + cpu-throttling=true (cold start aceptado por usuario, ahorra ~$60-80/mes)
#  11. worker minScale=1 + cpu-throttling=false (BullMQ poll loop necesita CPU continua)

---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: langfuse-web
  labels:
    cloud.googleapis.com/location: europe-west1
  annotations:
    run.googleapis.com/launch-stage: GA
    # F4 (2026-05-10): ingress=internal-and-cloud-load-balancing tras activar Cloud LB.
    # Bloquea acceso directo a .run.app — solo el LB puede invocar el servicio.
    # allUsers invoker es obligatorio (Serverless NEG no pasa IAM tokens).
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        # Execution environment gen2 — necesario para Direct VPC egress + probes
        run.googleapis.com/execution-environment: gen2
        # CPU throttling ON (default) → permite minScale=0
        # Trade-off: cold start del primer request del día (30-60s)
        run.googleapis.com/cpu-throttling: "true"
        # Decisión usuario 2026-05-08: minScale=0 ahorra ~$60-80/mes idle billing
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Direct VPC egress: el servicio inyecta una NIC en subnet-run-egress
        run.googleapis.com/network-interfaces: '[{"network":"vpc-langfuse","subnetwork":"subnet-run-egress","tags":["langfuse-egress"]}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: langfuse-web@${GCP_PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 80
      # web puede tardar en endpoints de export/eval; subido de 60→300
      timeoutSeconds: 300
      containers:
        - image: langfuse/langfuse:${LANGFUSE_VERSION}
          ports:
            - name: http1
              containerPort: 3000
          resources:
            # Minimum viable sizing (2026-05-09): langfuse-web real usa 651 MB
            # con 90 traces. 1 GiB suficiente con margen 1.5x. Subir a 2 GiB
            # si vemos OOM kills o Prisma client crece con migrations.
            limits:
              cpu: "1"
              memory: 1Gi
          # Healthcheck — Langfuse expone /api/public/health
          # 150s tolerancia arranque (Prisma migrations + ClickHouse init + S3 connect)
          startupProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          # Liveness más relajado (60s/3 = 180s offline antes de kill)
          # SSE streams largos en UI compiten con probes — evitar kills falsos
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
          env:
            # ── Postgres (Cloud SQL, Private IP via Direct VPC) ──
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-database-url
                  key: latest
            # ── Redis (Memorystore, private IP, AUTH + TLS) ──
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: langfuse-redis-host
                  key: latest
            - name: REDIS_PORT
              value: "6378"
            - name: REDIS_TLS_ENABLED
              value: "true"
            # Memorystore usa CA propia de Google — no en bundle Node.js.
            # Red privada VPC: cifrado activo, verificación de cert desactivada.
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-redis-auth
                  key: latest
            # ── ClickHouse (GCE self-hosted, ADR-012, IP privada 10.20.10.20) ──
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-url
                  key: latest
            - name: CLICKHOUSE_MIGRATION_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-migration-url
                  key: latest
            - name: CLICKHOUSE_USER
              value: langfuse
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-password
                  key: latest
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: CLICKHOUSE_MIGRATION_SSL
              value: "false"
            # ── S3 events bucket (atlax360-ai-langfuse-events vía GCS HMAC) ──
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: atlax360-ai-langfuse-events
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: europe-west1
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-id
                  key: latest
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
            # ── S3 media bucket (uploads UI: avatares, exports manuales) ──
            # Faltaba en el manifest pre-auditoría — añadido cambio #5
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: atlax360-ai-langfuse-media
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: europe-west1
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-id
                  key: latest
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
            # ── Auth secrets (NUNCA rotar — invalida sesiones / API keys) ──
            - name: NEXTAUTH_URL
              value: https://langfuse.atlax360.ai
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-nextauth-secret
                  key: latest
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-salt
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-encryption-key
                  key: latest
            # ── Telemetry & OTel ──
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: OTEL_SDK_DISABLED
              value: "true"
  traffic:
    # Deploy con --no-traffic (LATEST=0%); promoción manual con update-traffic.
    # En el primer deploy el manifest declara LATEST=100 para arranque.
    - percent: 100
      latestRevision: true

---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: langfuse-worker
  labels:
    cloud.googleapis.com/location: europe-west1
  annotations:
    run.googleapis.com/launch-stage: GA
    # Worker NO recibe tráfico HTTP de devs — sólo healthchecks internos
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        # cpu-throttling=false: BullMQ poll loop sobre Redis necesita CPU continua
        # entre healthchecks. Con cpu-throttling=true los jobs se atrasarían.
        run.googleapis.com/cpu-throttling: "false"
        # Worker SIEMPRE warm: minScale=1 (necesario con cpu-throttling=false)
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/network-interfaces: '[{"network":"vpc-langfuse","subnetwork":"subnet-run-egress","tags":["langfuse-egress"]}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: langfuse-worker@${GCP_PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 300
      containers:
        - image: langfuse/langfuse-worker:${LANGFUSE_VERSION}
          ports:
            - name: http1
              containerPort: 3030
          resources:
            # Minimum viable sizing (2026-05-09): langfuse-worker real usa
            # 375 MB con 90 traces. 2 GiB suficiente con margen 5x. CPU 1
            # vCPU sostenido cubre BullMQ poll loop + ingestion async.
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3030
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-database-url
                  key: latest
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: langfuse-redis-host
                  key: latest
            - name: REDIS_PORT
              value: "6378"
            - name: REDIS_TLS_ENABLED
              value: "true"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: langfuse-redis-auth
                  key: latest
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-url
                  key: latest
            - name: CLICKHOUSE_MIGRATION_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-migration-url
                  key: latest
            - name: CLICKHOUSE_USER
              value: langfuse
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-clickhouse-password
                  key: latest
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: CLICKHOUSE_MIGRATION_SSL
              value: "false"
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: atlax360-ai-langfuse-events
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: europe-west1
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-id
                  key: latest
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: atlax360-ai-langfuse-media
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: europe-west1
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: https://storage.googleapis.com
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-id
                  key: latest
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-gcs-hmac-secret
                  key: latest
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-salt
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-encryption-key
                  key: latest
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: OTEL_SDK_DISABLED
              value: "true"
  traffic:
    - percent: 100
      latestRevision: true
---
# ─── LiteLLM Gateway ──────────────────────────────────────────────────────────
# ADR-013 patrón: allUsers invoker + ingress=internal-and-cloud-load-balancing
# La BD litellm vive en el mismo Cloud SQL que Langfuse (IP privada 10.20.96.3).
# Config.yaml leído de Secret Manager (litellm-config-yaml) montado en /app/config.yaml.
# No usa ClickHouse ni Redis — solo Postgres (virtual keys + spend tracking).
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: litellm
  namespace: ${GCP_PROJECT_ID}
  labels:
    cloud.googleapis.com/location: europe-west1
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "true"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/network-interfaces: '[{"network":"vpc-langfuse","subnetwork":"subnet-run-egress","tags":["langfuse-egress"]}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: litellm@${GCP_PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 120
      containers:
        - image: europe-west1-docker.pkg.dev/${GCP_PROJECT_ID}/langfuse-images/litellm:v1.83.10-stable
          ports:
            - name: http1
              containerPort: 4000
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-database-url
                  key: latest
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: latest
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-salt-key
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-anthropic-api-key
                  key: latest
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-langfuse-public-key
                  key: latest
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-langfuse-secret-key
                  key: latest
            - name: LANGFUSE_HOST
              value: https://langfuse.atlax360.ai
            - name: STORE_MODEL_IN_DB
              value: "true"
            # Google Chat webhook para alertas de budget. Si no está set,
            # LiteLLM solo loguea el warning en stdout.
            - name: LITELLM_ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-gchat-webhook-url
                  key: latest
          # Cloud Run no soporta subPath en secretos — montamos como directorio
          # LiteLLM arranca con: litellm --config /app/secret/config.yaml
          args: ["--config", "/app/secret/config.yaml"]
          volumeMounts:
            - name: config-yaml
              mountPath: /app/secret
              readOnly: true
      volumes:
        - name: config-yaml
          secret:
            secretName: litellm-config-yaml
            items:
              - key: latest
                path: config.yaml
  traffic:
    - percent: 100
      latestRevision: true
