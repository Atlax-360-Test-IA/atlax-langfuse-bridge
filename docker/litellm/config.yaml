# ============================================================
# LiteLLM Gateway — Fase 1 (Atlax360)
# M1: 1 modelo + master key. M2: callback Langfuse activo.
# M3: virtual keys per-workload + soft budget + alertas.
# Docs: https://docs.litellm.ai/docs/proxy/configs
# ============================================================

model_list:
  # Modelo por defecto para workloads no-interactivos (Orvian, Atalaya).
  # Expone el alias "claude-sonnet-4-6" a los clientes OpenAI-compatible.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Permite gestionar modelos y virtual keys desde la admin UI — requerido por M3.
  store_model_in_db: true
  # M3: alertas de presupuesto. Dispara webhook cuando spend alcanza soft_budget.
  # LiteLLM lee SLACK_WEBHOOK_URL del entorno (inyectado por docker-compose).
  # Sin webhook configurado los warnings van a stdout (docker compose logs litellm).
  alerting: ["slack"]

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_default_tags: ["source:litellm-gateway", "infra:anthropic"]
  # Credenciales Langfuse leídas del entorno (inyectadas por docker-compose).
  # LiteLLM SDK espera LANGFUSE_PUBLIC_KEY / SECRET_KEY / HOST.
  # No confundir con LANGFUSE_INIT_PROJECT_* (bootstrap de Langfuse).
  #
  # Pricing: LiteLLM usa su BD interna de costes, no shared/model-pricing.ts.
  # Los traces source:litellm-gateway pueden mostrar cifras distintas a los
  # traces cc-* del hook. Divergencia aceptada y documentada (I-6).
