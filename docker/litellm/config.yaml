# ============================================================
# LiteLLM Gateway — Fase 1 (Atlax360)
# M1: 1 modelo + master key. M2: callback Langfuse activo.
# M3: virtual keys per-workload + soft budget + alertas.
# Docs: https://docs.litellm.ai/docs/proxy/configs
# ============================================================

model_list:
  # ── Sonnet 4.6 — workloads diarios (default para Orvian, Atalaya) ──────────
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Haiku 4.5 — clasificación, resúmenes, tasks de bajo coste ─────────────
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Opus 4.7 — arquitectura multi-fichero, auditorías, razonamiento profundo ─
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Vertex AI — Claude via GCP (per-dev attribution via virtual keys) ───────
  # El SA litellm@atlax360-ai-langfuse-pro tiene roles/aiplatform.user.
  # Usa Application Default Credentials del entorno Cloud Run (Workload Identity).
  # Región europe-west1 para cumplir residencia de datos EU y minimizar latencia.
  - model_name: vertex-claude-sonnet-4-6
    litellm_params:
      model: vertex_ai/claude-sonnet-4-6
      vertex_project: atlax360-ai-langfuse-pro
      vertex_location: europe-west1

  - model_name: vertex-claude-haiku-4-5
    litellm_params:
      model: vertex_ai/claude-haiku-4-5
      vertex_project: atlax360-ai-langfuse-pro
      vertex_location: europe-west1

  - model_name: vertex-claude-opus-4-7
    litellm_params:
      model: vertex_ai/claude-opus-4-7
      vertex_project: atlax360-ai-langfuse-pro
      vertex_location: europe-west1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Permite gestionar modelos y virtual keys desde la admin UI — requerido por M3.
  store_model_in_db: true
  # M3: alertas de presupuesto. Dispara webhook cuando spend alcanza soft_budget.
  # LiteLLM lee SLACK_WEBHOOK_URL del entorno (inyectado por docker-compose).
  # Sin webhook configurado los warnings van a stdout (docker compose logs litellm).
  alerting: ["slack"]

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # infra:anthropic / infra:vertex distinguibles por el campo model del trace.
  langfuse_default_tags: ["source:litellm-gateway"]
  # Credenciales Langfuse leídas del entorno (inyectadas por docker-compose).
  # LiteLLM SDK espera LANGFUSE_PUBLIC_KEY / SECRET_KEY / HOST.
  # No confundir con LANGFUSE_INIT_PROJECT_* (bootstrap de Langfuse).
  #
  # Pricing: LiteLLM usa su BD interna de costes, no shared/model-pricing.ts.
  # Los traces source:litellm-gateway pueden mostrar cifras distintas a los
  # traces cc-* del hook. Divergencia aceptada y documentada (I-6).
